openapi: 3.0.0
info:
  title: Alumni Influencers API
  description: |
    Web API for the **Alumni Influencers Platform** developed by Phantasmagoria Ltd for the University of Eastminster.

    ## Authentication
    Most endpoints require a **Bearer JWT Token** obtained from `POST /auth/login`.
    The Public Client API (for the AR client) uses an **API Key** sent in the `x-api-key` header.

    ## 🏛️ System Architecture
    This project follows a professional **Model-View-Controller (MVC)** architectural pattern, ensuring clean separation of concerns:
    - **Models**: Defines the data structures and validation using Mongoose schemas.
    - **Controllers**: Contains business logic, calculations, and algorithms (e.g., bidding selection).
    - **Routes**: Manages the mapping of HTTP endpoints to their respective controllers.
    - **Middleware**: Implements shared security, validation, and sanitization logic.

    ## 📊 Database Schema (ER Summary)
    - **User**: The root entity for authentication (verified email, hashed password, role).
    - **Profile**: A 1:1 relationship with the User, containing personal and professional data.
    - **Bid**: A 1:Many relationship with the User, tracking daily featured slot auctions.
    - **ApiKey**: Managed by Admins, used by mobile clients for public read access.

    ## 🔐 Key Features
    - Alumni Registration & Email Verification
    - Secure Login / Logout / Password Reset
    - Complete Alumni Profile Management (degrees, certifications, licences, courses, employment)
    - Blind Bidding System for daily featured slots
    - Admin API Key Management with Usage Statistics
    - Public AR Client API (get today's featured alumnus)
  version: 1.0.0
  contact:
    name: Phantasmagoria Ltd (Developer)

servers:
  - url: http://localhost:3000/api
    description: Local Development Server

# ─────────────────────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token obtained from POST /auth/login"
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: "API key generated by admin via POST /admin/apikeys"

  schemas:
    # ── Auth ──────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "john.smith@eastminster.ac.uk"
          description: "Must be a university email (.ac.uk or .edu)"
        password:
          type: string
          example: "Secure@Pass1"
          description: "Min 8 chars, must include uppercase, number, and special character"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "john.smith@eastminster.ac.uk"
        password:
          type: string
          example: "Secure@Pass1"

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: "john.smith@eastminster.ac.uk"

    ResetPasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          example: "NewSecure@Pass99"

    # ── Profile ───────────────────────────────────────────────
    DegreeEntry:
      type: object
      required: [degreeTitle, university]
      properties:
        degreeTitle:
          type: string
          example: "BSc Computer Science"
        university:
          type: string
          example: "University of Eastminster"
        completionDate:
          type: string
          format: date
          example: "2022-06-15"
        officialUrl:
          type: string
          format: uri
          example: "https://eastminster.ac.uk/courses/computer-science"

    CertificationEntry:
      type: object
      required: [name, issuingOrganization]
      properties:
        name:
          type: string
          example: "AWS Certified Solutions Architect"
        issuingOrganization:
          type: string
          example: "Amazon Web Services"
        completionDate:
          type: string
          format: date
          example: "2023-03-01"
        credentialUrl:
          type: string
          format: uri
          example: "https://aws.amazon.com/certification/verify"

    LicenceEntry:
      type: object
      required: [name, issuingBody]
      properties:
        name:
          type: string
          example: "Professional Engineer"
        issuingBody:
          type: string
          example: "Engineering Council UK"
        completionDate:
          type: string
          format: date
          example: "2023-09-01"
        licenceUrl:
          type: string
          format: uri
          example: "https://www.engc.org.uk/"

    CourseEntry:
      type: object
      required: [courseName, provider]
      properties:
        courseName:
          type: string
          example: "Machine Learning Fundamentals"
        provider:
          type: string
          example: "Coursera"
        completionDate:
          type: string
          format: date
          example: "2024-01-20"
        courseUrl:
          type: string
          format: uri
          example: "https://coursera.org/certificates/ml-fundamentals"

    EmploymentEntry:
      type: object
      required: [company, role, startDate]
      properties:
        company:
          type: string
          example: "Phantasmagoria Ltd"
        role:
          type: string
          example: "Senior Software Engineer"
        startDate:
          type: string
          format: date
          example: "2022-09-01"
        endDate:
          type: string
          format: date
          example: "2024-12-31"
          nullable: true
        current:
          type: boolean
          example: false

    ProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          example: "John"
        lastName:
          type: string
          example: "Smith"
        bio:
          type: string
          example: "Software engineer passionate about AI and education technology."
        linkedinUrl:
          type: string
          format: uri
          example: "https://uk.linkedin.com/in/johnsmith"
        degrees:
          type: array
          items:
            $ref: '#/components/schemas/DegreeEntry'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/CertificationEntry'
        licences:
          type: array
          items:
            $ref: '#/components/schemas/LicenceEntry'
        professionalCourses:
          type: array
          items:
            $ref: '#/components/schemas/CourseEntry'
        employmentHistory:
          type: array
          items:
            $ref: '#/components/schemas/EmploymentEntry'

    ProfileResponse:
      allOf:
        - $ref: '#/components/schemas/ProfileRequest'
        - type: object
          properties:
            _id:
              type: string
            user:
              type: string
            profileImage:
              type: string
              example: "http://localhost:3000/uploads/file-1720000000000.jpg"
            appearanceCount:
              type: integer
              example: 3
            bonusSlotAvailable:
              type: boolean
              example: false
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    # ── Bid ───────────────────────────────────────────────────
    PlaceBidRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          example: 250.00
          description: "Must be a positive number, and higher than your current bid if updating"

    BidStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            hasBid:
              type: boolean
            bidAmount:
              type: number
              example: 250.00
            targetDate:
              type: string
              format: date-time
            bidStatus:
              type: string
              enum: [Winning, Losing]
              example: "Winning"
            winsThisMonth:
              type: integer
              example: 1
            remainingWinsThisMonth:
              type: integer
              example: 2
            bonusSlotActive:
              type: boolean
              example: false

    # ── API Key ───────────────────────────────────────────────
    ApiKeyCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "AR Mobile Client v1"

    ApiKeyResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            name:
              type: string
              example: "AR Mobile Client v1"
            key:
              type: string
              example: "a3f4b1e2c5d6..."
              description: "Save this key securely — it will not be shown again"

    UsageStatResponse:
      type: object
      properties:
        date:
          type: string
          format: date-time
        endpoint:
          type: string
          example: "/api/client/alumni-of-the-day"
        method:
          type: string
          example: "GET"

    # ── Errors ────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "An error occurred"

# Global security — most routes require Bearer JWT
security:
  - bearerAuth: []

# ─────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────
paths:

  # ── Authentication ─────────────────────────────────────────
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new alumni
      description: |
        Creates a new alumni account. Sends a verification email.
        - Email must be a university domain (.ac.uk or .edu)
        - Password must be at least 8 characters with uppercase, number, and special character
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "john.smith@eastminster.ac.uk"
              password: "Secure@Pass1"
      responses:
        '200':
          description: Registration successful — verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Registration successful. Please check your email to verify your account."
        '400':
          description: Validation error (duplicate email, invalid domain, weak password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login and get JWT token
      description: |
        Returns a JWT Bearer token on success.
        **Note:** The account must be email-verified before logging in.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful — JWT token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials or unverified email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    get:
      tags: [Authentication]
      summary: Logout current user
      description: Clears session. The client should discard the JWT token.
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logged out successfully"
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verifyemail/{token}:
    get:
      tags: [Authentication]
      summary: Verify email address
      description: |
        Called when the user clicks the verification link in their email.
        The token is valid for 24 hours and is single-use.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          description: Verification token received in the registration email
          schema:
            type: string
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Email verified successfully. You can now log in."
        '400':
          description: Invalid or expired verification token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgotpassword:
    post:
      tags: [Authentication]
      summary: Request a password reset email
      description: Sends a password reset link to the provided email. Token expires in 10 minutes.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "Password reset email sent"
        '404':
          description: No user with that email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/resetpassword/{token}:
    put:
      tags: [Authentication]
      summary: Reset password using the token from email
      description: |
        Resets the user's password. The token is single-use and expires in 10 minutes.
        The new password must meet strength requirements (min 8 chars, uppercase, number, special char).
      security: []
      parameters:
        - name: token
          in: path
          required: true
          description: Password reset token received in the forgot-password email
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful — JWT token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid/expired token or weak password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Profile ────────────────────────────────────────────────
  /profile:
    get:
      tags: [Profile]
      summary: Get all alumni profiles
      description: Returns a list of all alumni profiles. Public endpoint.
      security: []
      responses:
        '200':
          description: List of profiles returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProfileResponse'

    post:
      tags: [Profile]
      summary: Create or update the current user's profile
      description: |
        Creates a new profile for the logged-in alumni, or updates it if one already exists.
        Supports all profile sections: degrees, certifications, licences, professional courses, and employment history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
      responses:
        '200':
          description: Profile created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/me:
    get:
      tags: [Profile]
      summary: Get the current user's own profile
      responses:
        '200':
          description: Current user's profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProfileResponse'
        '400':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/user/{user_id}:
    get:
      tags: [Profile]
      summary: Get a specific alumni profile by user ID
      security: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the user
      responses:
        '200':
          description: Profile found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProfileResponse'
        '400':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/uploadphoto:
    put:
      tags: [Profile]
      summary: Upload a profile photo
      description: |
        Uploads a profile image file (JPEG, JPG, PNG, GIF).
        Maximum file size: 1 MB.
        The `file` field name must be used in the multipart form.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Image file (jpeg, jpg, png, gif — max 1MB)"
      responses:
        '200':
          description: Photo uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: string
                    example: "file-1720000000000.jpg"
        '400':
          description: No file provided or invalid file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile:
    delete:
      tags: [Profile]
      summary: Delete the current user's profile
      description: Permanently removes the alumni profile for the logged-in user.
      responses:
        '200':
          description: Profile deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "User deleted"
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Bidding ────────────────────────────────────────────────
  /bids:
    post:
      tags: [Bidding]
      summary: Place or update a bid for tomorrow's featured slot
      description: |
        Places a bid for tomorrow's "Alumni of the Day" slot.
        - **Blind bidding**: you will receive only a `Winning` or `Losing` status, not the actual highest bid amount
        - If a bid already exists for tomorrow, it can only be **increased** (not decreased)
        - Monthly limit: **3 wins per calendar month** (4 with bonus slot for attending a university event)
        - At **6 PM daily**, the cron job selects the highest bidder as the winner for the following day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBidRequest'
      responses:
        '200':
          description: Bid placed or updated. Returns blind bidding feedback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidStatusResponse'
        '400':
          description: Validation error (e.g. bid too low, monthly limit reached, no profile)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /bids/status:
    get:
      tags: [Bidding]
      summary: Get current bid status for tomorrow's slot
      description: |
        Returns whether the user is currently winning or losing for tomorrow's slot,
        along with their monthly wins count and remaining slots.
      responses:
        '200':
          description: Current bid status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidStatusResponse'

  /bids/history:
    get:
      tags: [Bidding]
      summary: Get all past bids for the current user
      description: Returns a full history of bids, sorted by most recent first.
      responses:
        '200':
          description: Bid history returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        amount:
                          type: number
                        targetDate:
                          type: string
                          format: date-time
                        status:
                          type: string
                          enum: [active, won, lost, cancelled]
                        createdAt:
                          type: string
                          format: date-time

  # ── Admin — API Key Management ─────────────────────────────
  /admin/apikeys:
    post:
      tags: [Admin — API Keys]
      summary: Generate a new API key (Admin only)
      description: |
        Creates a new API key with a given name. The key is returned once — save it securely.
        **Requires admin role.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201':
          description: API key generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '403':
          description: Not authorised as admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Admin — API Keys]
      summary: List all API keys (Admin only)
      description: Returns all API keys (without usage stats). **Requires admin role.**
      responses:
        '200':
          description: List of API keys returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        name:
                          type: string
                        key:
                          type: string
                        isActive:
                          type: boolean
                        createdAt:
                          type: string
                          format: date-time

  /admin/apikeys/{id}/stats:
    get:
      tags: [Admin — API Keys]
      summary: Get usage statistics for an API key (Admin only)
      description: |
        Returns all usage events for the specified API key: timestamps, endpoints, and HTTP methods.
        **Requires admin role.**
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the API key
      responses:
        '200':
          description: Usage statistics returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                      usageCount:
                        type: integer
                        example: 42
                      usageStats:
                        type: array
                        items:
                          $ref: '#/components/schemas/UsageStatResponse'
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/apikeys/{id}:
    delete:
      tags: [Admin — API Keys]
      summary: Revoke an API key (Admin only)
      description: Deactivates the API key so it can no longer be used. **Requires admin role.**
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: MongoDB ObjectId of the API key to revoke
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "API Key revoked"
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Public Client API ──────────────────────────────────────
  /client/alumni-of-the-day:
    get:
      tags: [Public Client API]
      summary: Get the Alumni of the Day (AR Client endpoint)
      description: |
        Returns the complete profile of today's featured alumni — the highest bidder from yesterday's 6 PM selection.

        **Authentication**: Requires a valid API key in the `x-api-key` request header.
        Every call is logged and contributes to the API key's usage statistics.
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Today's featured alumni profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "John Smith"
                      bio:
                        type: string
                      profileImage:
                        type: string
                        format: uri
                        nullable: true
                        example: "http://localhost:3000/uploads/file-123.jpg"
                      linkedinUrl:
                        type: string
                        format: uri
                      degrees:
                        type: array
                        items:
                          $ref: '#/components/schemas/DegreeEntry'
                      certifications:
                        type: array
                        items:
                          $ref: '#/components/schemas/CertificationEntry'
                      licences:
                        type: array
                        items:
                          $ref: '#/components/schemas/LicenceEntry'
                      professionalCourses:
                        type: array
                        items:
                          $ref: '#/components/schemas/CourseEntry'
                      employmentHistory:
                        type: array
                        items:
                          $ref: '#/components/schemas/EmploymentEntry'
                      appearanceCount:
                        type: integer
                        example: 3
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No alumni selected for today
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
